! Arista EOS
! Software image version: 4.29.2F
!
hostname ARISTA-DIST-SW02
!
username admin privilege 15 secret sha512 $6$aristaadmin2$hashedpasswordXYZ
username readonly privilege 1 secret sha512 $6$readonly$hashedreadonlypassword
!
aaa authentication login default group radius local
aaa authorization exec default local
!
management api http-commands
   no shutdown
!
daemon TerminAttr
   exec /usr/bin/TerminAttr -cvaddr=apiserver.arista.io:443 -cvauth=token,/tmp/token -taillogs
   no shutdown
!
ip routing
!
spanning-tree mode mstp
spanning-tree mst 0 priority 8192
!
vlan 10
   name User-LAN
!
vlan 20
   name Voice
!
vlan 30
   name Servers
!
vlan 99
   name Management
!
interface Ethernet1
   description UPLINK-TO-ARISTA-CORE-SW01-Eth1
   no switchport
   ip address 10.1.0.2/30
!
interface Ethernet2
   description DOWNLINK-TO-HUAWEI-ACCESS-SW01-GE0/0/1
   switchport mode trunk
   switchport trunk allowed vlan 10,20,99
!
interface Ethernet3
   description UPLINK-TO-ARISTA-CORE-SW01-Eth3
   switchport mode trunk
   switchport trunk allowed vlan 10,20,30,99
!
interface Ethernet4
   description DOWNLINK-TO-HUAWEI-ACCESS-SW02-GE0/0/1
   switchport mode trunk
   switchport trunk allowed vlan 10,20,99
!
interface Ethernet5
   description ACCESS-USER-DESK-1A-01
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
!
interface Ethernet6
   description ACCESS-USER-DESK-1A-02
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
!
interface Ethernet7
   description ACCESS-VOICE-PHONE-1A-01
   switchport mode access
   switchport access vlan 20
   spanning-tree portfast
!
interface Ethernet8
   description SPARE-DISABLED
   shutdown
!
interface Loopback0
   description ROUTER-ID
   ip address 10.255.0.11/32
!
interface Management1
   description OOB-MGMT
   ip address 10.99.0.11/24
!
interface Vlan10
   description User-LAN-Gateway
   ip address 10.10.10.2/24
!
interface Vlan20
   description Voice-Gateway
   ip address 10.10.20.2/24
!
interface Vlan99
   description Management-Gateway
   ip address 10.99.0.11/24
!
router ospf 1
   router-id 10.255.0.11
   passive-interface default
   no passive-interface Ethernet1
   network 10.0.0.0/8 area 0.0.0.0
!
ip route 0.0.0.0/0 10.1.0.1
!
ntp server 10.0.0.10 prefer
ntp server 10.0.0.11
!
snmp-server community $1$snmpcommarista2 authorization ro
snmp-server host 10.0.0.50 version 2c $1$snmptrap2
snmp-server location DC1-Row1-Rack2
snmp-server contact netops@lab.internal
!
logging host 10.0.0.50
!
end
