   name "MGMT-OOB"
   exit

spanning-tree
spanning-tree mode mstp
spanning-tree priority 12

spanning-tree 1/1 admin-edge-port
spanning-tree 1/2 admin-edge-port
spanning-tree 1/3-1/24 admin-edge-port bpdu-protection
spanning-tree 1/47-1/48 admin-edge-port bpdu-protection

lldp run
lldp config 1/1-1/48 basicTlvEnable system-name system-description port-description management-address

