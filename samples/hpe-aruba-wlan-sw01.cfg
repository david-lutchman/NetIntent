hostname "ARUBA-WLAN-SW01"

module 1 type j9729a

snmp-server community "rO-aruba-wlan01!" operator
snmp-server community "wR-aruba-wlan01!" manager
snmp-server host 10.100.99.50 community "rO-aruba-wlan01!" trap-level all
snmp-server contact "noc@acme-corp.internal"
snmp-server location "ACME-BldgA-Floor3-IDF-B"

timesync ntp
ntp server 10.100.99.10 prefer
ntp server 10.100.99.11
ntp enable

time timezone -300
time daylight-time-rule continental-us-and-canada

ip dns domain-name "acme-corp.internal"
ip dns server-address priority 1 10.100.99.10
ip dns server-address priority 2 10.100.99.11

ip default-gateway 10.100.99.1

ip ssh version 2
ip ssh cipher aes256-ctr aes128-ctr
ip ssh mac hmac-sha2-256 hmac-sha1
no telnet-server

password manager user-name "admin" sha1 "5baa61e4c9b93f3f0682250b6cf8331b7ee68fd8"
password operator user-name "netops" sha1 "a94a8fe5ccb19ba61c4c0873d391e987982fbbd3"

aaa authentication console login local
aaa authentication console enable local
aaa authentication ssh login local
aaa authentication ssh enable local
aaa port-access authenticator active

vlan 1
   name "DEFAULT"
   no untagged 1-48
   no ip address
   exit

vlan 40
   name "WIRELESS"
   tagged 1/1,1/2
   untagged 1/3-1/24
   ip address 10.100.40.7 255.255.255.0
   ip helper-address 10.100.99.10
   exit

vlan 99
   name "MANAGEMENT"
   tagged 1/1,1/2
   untagged 1/47,1/48
   ip address 10.100.99.7 255.255.255.0
   exit

vlan 100
   name "NATIVE"
   untagged 1/1,1/2
   no ip address
   exit

vlan 999
   name "BLACKHOLE"
   untagged 1/25-1/46
   no ip address
   exit

interface 1/1
   name "UPLINK-TO-HW-DIST-SW01 | to HW-DIST-SW01 GE0/0/4"
   flow-control
   exit

interface 1/2
