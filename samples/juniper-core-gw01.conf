## Last changed: 2026-01-15 14:32:01 UTC
## Image name: JUNOS 22.4R1.10
version 22.4R1.10;
system {
    host-name JUNIPER-CORE-GW01;
    domain-name lab.internal;
    time-zone UTC;
    authentication-order [ radius password ];
    root-authentication {
        encrypted-password "$6$rHG3lP$wQz9K2mXvNpABcDeFgHiJkLmNoPqRsTuVwXyZ0123456789abcdefghij";
    }
    name-server {
        10.0.0.10;
        10.0.0.11;
    }
    radius-server {
        10.0.0.20 {
            port 1812;
            secret "$9$abcDEFghiJKLmnoPQRstuvwxyz";
            source-address 10.1.0.1;
        }
    }
    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "$6$saltval$hashedpasswordstring123456789abcdef";
            }
        }
        user netops {
            uid 2001;
            class operator;
            authentication {
                encrypted-password "$6$saltval2$hashedpasswordstring987654321fedcba";
            }
        }
    }
    services {
        ssh {
            root-login deny;
            protocol-version v2;
            max-sessions-per-connection 32;
        }
        netconf {
            ssh {
                port 830;
            }
        }
        ntp {
            server 10.0.0.10 prefer;
            server 10.0.0.11;
            source-address 10.1.0.1;
        }
    }
    syslog {
        host 10.0.0.50 {
            any notice;
            daemon info;
        }
        file messages {
            any notice;
            authorization info;
        }
        file interactive-commands {
            interactive-commands any;
        }
    }
    archival {
        configuration {
            transfer-on-commit;
            archive-sites {
                "scp://admin@10.0.0.60/configs";
            }
        }
    }
}
chassis {
    aggregated-devices {
        ethernet {
            device-count 8;
        }
    }
    alarm {
        management-ethernet {
            link-down ignore;
        }
    }
}
interfaces {
    ge-0/0/0 {
        description "UPLINK-TO-CORE-SW01-Gi0/1";
        mtu 9000;
        unit 0 {
            family inet {
                address 10.1.0.2/30;
            }
            family inet6 {
                address 2001:db8:1::/127;
            }
        }
    }
    ge-0/0/1 {
        description "UPLINK-TO-DIST-SW01-Gi0/1";
        mtu 9000;
        unit 0 {
            family inet {
                address 10.1.0.6/30;
            }
        }
    }
    ge-0/0/2 {
        description "LINK-TO-PALOALTO-FW01-eth1/1";
        mtu 1500;
        unit 0 {
            family inet {
                address 10.1.0.9/30;
            }
        }
    }
    ge-0/0/3 {
        description "WAN-PRIMARY-ISP1";
        mtu 1500;
        unit 0 {
            family inet {
                address 203.0.113.2/30;
            }
        }
    }
    ge-0/0/4 {
        description "WAN-SECONDARY-ISP2";
        mtu 1500;
        unit 0 {
            family inet {
                address 198.51.100.2/30;
            }
        }
    }
    ge-0/0/5 {
        description "LINK-TO-CHECKPOINT-FW01-eth1";
        unit 0 {
            family inet {
                address 10.1.0.13/30;
            }
        }
    }
    ge-0/0/6 {
        description "SERVER-FARM-UPLINK";
        unit 0 {
            family inet {
                address 10.10.0.1/24;
            }
        }
    }
    ge-0/0/7 {
        description "MGMT-OOB-LINK";
        unit 0 {
            family inet {
                address 192.168.100.1/24;
            }
        }
    }
    ae0 {
        description "LAG-TO-CORE-SW01";
        aggregated-ether-options {
            lacp {
                active;
                periodic fast;
            }
        }
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members [ VLAN10 VLAN20 VLAN30 VLAN99 ];
                }
                native-vlan-id 99;
            }
        }
    }
    ae1 {
        description "LAG-TO-DIST-SW01";
        aggregated-ether-options {
            lacp {
                active;
                periodic fast;
            }
        }
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members [ VLAN10 VLAN20 VLAN30 VLAN99 ];
                }
            }
        }
    }
    lo0 {
        description "LOOPBACK";
        unit 0 {
            family inet {
                address 10.255.0.1/32;
            }
        }
    }
    irb {
        unit 10 {
            description "VLAN10-USER-SVI";
            family inet {
                address 10.10.10.1/24;
            }
        }
        unit 20 {
            description "VLAN20-VOICE-SVI";
            family inet {
                address 10.10.20.1/24;
            }
        }
        unit 30 {
            description "VLAN30-SERVERS-SVI";
            family inet {
                address 10.10.30.1/24;
            }
        }
        unit 99 {
            description "VLAN99-MGMT-SVI";
            family inet {
                address 10.99.0.1/24;
            }
        }
    }
}
vlans {
    VLAN10 {
        vlan-id 10;
        description "User-LAN";
        l3-interface irb.10;
    }
    VLAN20 {
        vlan-id 20;
        description "Voice";
        l3-interface irb.20;
    }
    VLAN30 {
        vlan-id 30;
        description "Servers";
        l3-interface irb.30;
    }
    VLAN99 {
        vlan-id 99;
        description "Management";
        l3-interface irb.99;
    }
}
routing-options {
    router-id 10.255.0.1;
    autonomous-system 65001;
    static {
        route 0.0.0.0/0 {
            next-hop 203.0.113.1;
            preference 5;
        }
        route 0.0.0.0/0 {
            next-hop 198.51.100.1;
            preference 10;
        }
        route 10.0.0.0/8 next-hop 10.1.0.1;
    }
    forwarding-table {
        export LOAD-BALANCE-POLICY;
    }
}
protocols {
    ospf {
        area 0.0.0.0 {
            interface ge-0/0/0.0 {
                interface-type p2p;
                hello-interval 5;
                dead-interval 20;
                authentication {
                    md5 1 key "$9$ospfkey123456789";
                }
            }
            interface ge-0/0/1.0 {
                interface-type p2p;
                hello-interval 5;
                dead-interval 20;
                authentication {
                    md5 1 key "$9$ospfkey123456789";
                }
            }
            interface lo0.0 {
                passive;
            }
        }
    }
    bgp {
        group IBGP-PEERS {
            type internal;
            local-address 10.255.0.1;
            hold-time 90;
            authentication-key "$9$bgpkey987654321";
            neighbor 10.255.0.2 {
                description "CORE-SW01";
            }
            neighbor 10.255.0.3 {
                description "DIST-SW01";
            }
        }
        group EBGP-ISP1 {
            type external;
            peer-as 64496;
            neighbor 203.0.113.1 {
                description "ISP1-BGP-PEER";
                export [ ANNOUNCE-PREFIXES ];
            }
        }
    }
    lldp {
        interface all;
    }
    rstp {
        bridge-priority 4096;
        interface ae0 {
            edge;
        }
    }
}
policy-options {
    prefix-list MGMT-SUBNETS {
        10.99.0.0/24;
        192.168.100.0/24;
    }
    prefix-list ANNOUNCE-TO-ISP {
        10.0.0.0/8;
    }
    policy-statement LOAD-BALANCE-POLICY {
        then {
            load-balance per-packet;
        }
    }
    policy-statement ANNOUNCE-PREFIXES {
        term 1 {
            from {
                prefix-list ANNOUNCE-TO-ISP;
            }
            then accept;
        }
        term default {
            then reject;
        }
    }
    community NO-EXPORT members no-export;
}
firewall {
    filter PROTECT-RE {
        term ALLOW-BGP {
            from {
                protocol tcp;
                destination-port bgp;
            }
            then accept;
        }
        term ALLOW-OSPF {
            from {
                protocol ospf;
            }
            then accept;
        }
        term ALLOW-SSH-FROM-MGMT {
            from {
                source-prefix-list MGMT-SUBNETS;
                protocol tcp;
                destination-port ssh;
            }
            then accept;
        }
        term ALLOW-SNMP {
            from {
                source-prefix-list MGMT-SUBNETS;
                protocol udp;
                destination-port snmp;
            }
            then accept;
        }
        term ALLOW-ICMP {
            from {
                protocol icmp;
                icmp-type [ echo-request echo-reply ];
            }
            then accept;
        }
        term DENY-ALL {
            then {
                discard;
                count DENY-ALL-COUNT;
                syslog;
            }
        }
    }
    filter RATE-LIMIT-ICMP {
        term ICMP {
            from {
                protocol icmp;
            }
            then {
                policer ICMP-POLICER;
                accept;
            }
        }
    }
    policer ICMP-POLICER {
        if-exceeding {
            bandwidth-limit 1m;
            burst-size-limit 15k;
        }
        then discard;
    }
}
snmp {
    location "DC1-Row3-Rack12";
    contact "netops@lab.internal";
    community "$9$snmpcommunity123" {
        authorization read-only;
        clients {
            10.0.0.50/32;
            10.99.0.0/24;
        }
    }
    trap-group TRAPS {
        version v2;
        categories {
            chassis;
            link;
            routing;
        }
        targets {
            10.0.0.50;
        }
    }
}
class-of-service {
    classifiers {
        dscp DSCP-CLASSIFIER {
            forwarding-class VOICE {
                loss-priority low code-points [ ef ];
            }
            forwarding-class CRITICAL {
                loss-priority low code-points [ af31 af32 af33 ];
            }
            forwarding-class BEST-EFFORT {
                loss-priority low code-points [ be ];
            }
        }
    }
    forwarding-classes {
        queue 0 BEST-EFFORT;
        queue 1 CRITICAL;
        queue 5 VOICE;
        queue 7 NETWORK-CONTROL;
    }
    interfaces {
        ge-0/0/3 {
            unit 0 {
                classifiers {
                    dscp DSCP-CLASSIFIER;
                }
            }
        }
    }
    scheduler-maps {
        DEFAULT-MAP {
            forwarding-class BEST-EFFORT scheduler BEST-EFFORT-SCHEDULER;
            forwarding-class VOICE scheduler VOICE-SCHEDULER;
        }
    }
    schedulers {
        BEST-EFFORT-SCHEDULER {
            transmit-rate percent 60;
            buffer-size percent 60;
            priority low;
        }
        VOICE-SCHEDULER {
            transmit-rate percent 20;
            buffer-size percent 10;
            priority strict-high;
        }
    }
}
