#conf_file_ver=00000001
config-version=FGT60F-7.4.3-FW-build2573-231117:opmode=0:vdom=0:user=admin

config system global
    set hostname FORTINET-BRANCH-FW02
    set timezone 00
    set admin-timeout 10
    set strong-crypto enable
end

config system interface
    edit "wan1"
        set vdom "root"
        set ip 203.0.113.30 255.255.255.252
        set allowaccess ping
        set type physical
        set alias "WAN-ISP-UPLINK"
        set status up
    next
    edit "port2"
        set vdom "root"
        set ip 192.168.80.1 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set alias "BRANCH-LAN-TRUST"
        set status up
    next
    edit "port3"
        set vdom "root"
        set ip 192.168.81.1 255.255.255.0
        set allowaccess ping
        set type physical
        set alias "BRANCH-VOICE-LAN"
        set status up
    next
    edit "port4"
        set vdom "root"
        set ip 192.168.82.1 255.255.255.0
        set allowaccess ping
        set type physical
        set alias "BRANCH-GUEST-WIFI"
        set status up
    next
    edit "port5"
        set vdom "root"
        set ip 192.168.200.7 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set alias "OOB-MGMT"
        set status up
    next
    edit "port6"
        set type physical
        set alias "SPARE-UNUSED"
        set status down
    next
end

config system dns
    set primary 10.0.0.10
    set secondary 8.8.8.8
end

config router static
    edit 1
        set dst 0.0.0.0/0
        set gateway 203.0.113.29
        set device "wan1"
    next
    edit 2
        set dst 10.30.0.0 255.255.255.0
        set gateway 192.168.80.254
        set device "port2"
    next
    edit 3
        set dst 10.50.0.0 255.255.255.0
        set gateway 192.168.80.254
        set device "port2"
    next
end

config firewall address
    edit "BRANCH-LAN"
        set subnet 192.168.80.0 255.255.255.0
    next
    edit "BRANCH-VOICE"
        set subnet 192.168.81.0 255.255.255.0
    next
    edit "BRANCH-GUEST"
        set subnet 192.168.82.0 255.255.255.0
    next
    edit "HQ-TRUST"
        set subnet 10.30.0.0 255.255.255.0
    next
    edit "HQ-SERVERS"
        set subnet 10.50.0.0 255.255.255.0
    next
end

config firewall policy
    edit 1
        set name "BRANCH-TO-INTERNET"
        set srcintf "port2"
        set dstintf "wan1"
        set srcaddr "BRANCH-LAN"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set logtraffic all
        set utm-status enable
        set webfilter-profile "default"
    next
    edit 2
        set name "BRANCH-TO-HQ-VPN"
        set srcintf "port2"
        set dstintf "VPN-TO-HQ"
        set srcaddr "BRANCH-LAN"
        set dstaddr "HQ-TRUST" "HQ-SERVERS"
        set action accept
        set schedule "always"
        set service "ALL"
    next
    edit 3
        set name "VOICE-SIP-RTP"
        set srcintf "port3"
        set dstintf "wan1"
        set srcaddr "BRANCH-VOICE"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "SIP" "RTP-HIGH"
    next
    edit 4
        set name "GUEST-INTERNET-ONLY"
        set srcintf "port4"
        set dstintf "wan1"
        set srcaddr "BRANCH-GUEST"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set utm-status enable
        set webfilter-profile "default"
    next
    edit 5
        set name "DENY-GUEST-TO-INTERNAL"
        set srcintf "port4"
        set dstintf "port2" "port3"
        set srcaddr "BRANCH-GUEST"
        set dstaddr "BRANCH-LAN" "BRANCH-VOICE"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 100
        set name "IMPLICIT-DENY-ALL"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
end

config vpn ipsec phase1-interface
    edit "VPN-TO-HQ"
        set interface "wan1"
        set ike-version 2
        set keylife 86400
        set peertype any
        set proposal aes256-sha256
        set dhgrp 14
        set authmethod psk
        set psksecret "$1$vpnpsk/branchofficekey123"
        set remote-gw 203.0.113.20
    next
end

config vpn ipsec phase2-interface
    edit "VPN-PHASE2-TO-HQ"
        set phase1name "VPN-TO-HQ"
        set proposal aes256-sha256
        set keylifeseconds 3600
        set src-subnet 192.168.80.0 255.255.255.0
        set dst-subnet 10.30.0.0 255.255.255.0
    next
end

config system admin
    edit "admin"
        set password "$1$branchadminpassword"
        set accprofile "super_admin"
    next
end

config log syslogd setting
    set status enable
    set server 10.0.0.50
    set port 514
end
