## Last changed: 2026-03-16 08:45:22 UTC
## Image name: junos-srxsme-22.4R2.8-domestic
version 22.4R2.8;
system {
    host-name SRX-FW01;
    domain-name acme-corp.internal;
    time-zone UTC;
    root-authentication {
        encrypted-password "$6$abcdef$rHG3lPwQz9K2mXvNpABcDeFgHiJkLmNoPqRsTuVwXyZ0123456789abcdefghijklmnop";
    }
    name-server {
        10.100.99.10;
        10.100.99.11;
    }
    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "$6$saltval$hashedpasswordstringForSRXadmin123456789abcdefghijklmnop";
            }
        }
        user secops {
            uid 2001;
            class security;
            authentication {
                encrypted-password "$6$saltval2$hashedpasswordstringForSRXsecops987654321fedcbaghijklmnop";
            }
        }
    }
    services {
        ssh {
            root-login deny;
            protocol-version v2;
            max-sessions-per-connection 16;
            rate-limit 5;
        }
        netconf {
            ssh {
                port 830;
            }
        }
        ntp {
            server 10.100.99.10 prefer;
            server 10.100.99.11;
        }
    }
    syslog {
        host 10.100.99.50 {
            any warning;
            firewall any;
            security info;
        }
        host 10.100.99.51 {
            any error;
        }
        file messages {
            any notice;
            authorization info;
        }
        file security-log {
            security any;
        }
    }
}
chassis {
    cluster {
        reth-count 4;
        redundancy-group 0 {
            node 0 priority 200;
            node 1 priority 100;
        }
        redundancy-group 1 {
            node 0 priority 200;
            node 1 priority 100;
            preempt;
            interface-monitor {
                ge-0/0/0 weight 255;
                ge-0/0/1 weight 255;
            }
        }
    }
}
interfaces {
    ge-0/0/0 {
        description "TRANSIT-TO-CSR-EDGE-RTR01 | to CSR-EDGE-RTR01 Gi2";
        mtu 1500;
        unit 0 {
            family inet {
                address 172.16.0.2/30;
            }
        }
    }
    ge-0/0/1 {
        description "TRANSIT-TO-FG-DC-FW01 | to FG-DC-FW01 port1";
        mtu 1500;
        unit 0 {
            family inet {
                address 172.16.0.41/30;
            }
        }
    }
    ge-0/0/2 {
        description "TRANSIT-TO-ARISTA-SPINE01 | to ARISTA-SPINE01 Et1";
        mtu 9000;
        unit 0 {
            family inet {
                address 172.16.0.5/30;
            }
        }
    }
    ge-0/0/3 {
        description "DMZ-SEGMENT";
        unit 0 {
            family inet {
                address 10.200.1.1/24;
            }
        }
    }
    ge-0/0/4 {
        description "GUEST-WIFI-SEGMENT";
        unit 0 {
            family inet {
                address 10.200.50.1/24;
            }
        }
    }
    ge-0/0/5 {
        disable;
    }
    ge-0/0/6 {
        disable;
    }
    ge-0/0/7 {
        description "HA-CONTROL-LINK";
        unit 0 {
            family inet {
                address 172.16.255.1/30;
            }
        }
    }
    lo0 {
        description "LOOPBACK";
        unit 0 {
            family inet {
                filter {
                    input PROTECT-RE;
                }
                address 10.255.1.2/32;
            }
        }
    }
}
routing-options {
    router-id 10.255.1.2;
    static {
        route 0.0.0.0/0 next-hop 172.16.0.1;
    }
}
protocols {
    ospf {
        area 0.0.0.0 {
            interface ge-0/0/0.0 {
                interface-type p2p;
                hello-interval 5;
                dead-interval 20;
                authentication {
                    md5 1 key "$9$ospfKeyForSRX01abc123";
                }
            }
            interface ge-0/0/2.0 {
                interface-type p2p;
                hello-interval 5;
                dead-interval 20;
            }
            interface lo0.0 {
                passive;
            }
        }
    }
    lldp {
        interface all;
    }
}
security {
    address-book {
        global {
            address SERVERS-NET 10.100.10.0/24;
            address WORKSTATIONS-NET 10.100.20.0/24;
            address VOIP-NET 10.100.30.0/24;
            address MGMT-NET 10.100.99.0/24;
            address DMZ-NET 10.200.1.0/24;
            address GUEST-NET 10.200.50.0/24;
            address-set INTERNAL-NETS {
                address SERVERS-NET;
                address WORKSTATIONS-NET;
                address VOIP-NET;
                address MGMT-NET;
            }
        }
    }
    zones {
        security-zone TRUST {
            host-inbound-traffic {
                system-services {
                    ping;
                    ssh;
                    snmp;
                    ntp;
                    netconf;
                }
                protocols {
                    ospf;
                }
            }
            interfaces {
                ge-0/0/2.0;
            }
        }
        security-zone UNTRUST {
            screen untrust-screen;
            host-inbound-traffic {
                system-services {
                    ping;
                }
                protocols {
                    ospf;
                }
            }
            interfaces {
                ge-0/0/0.0;
                ge-0/0/1.0;
            }
        }
        security-zone DMZ {
            host-inbound-traffic {
                system-services {
                    ping;
                }
            }
            interfaces {
                ge-0/0/3.0;
            }
        }
        security-zone GUEST {
            host-inbound-traffic {
                system-services {
                    dhcp;
                    dns;
                }
            }
            interfaces {
                ge-0/0/4.0;
            }
        }
    }
    screen {
        ids-option untrust-screen {
            icmp {
                ping-death;
                large;
                flood threshold 500;
            }
            tcp {
                syn-flood {
                    alarm-threshold 2048;
                    attack-threshold 4096;
                    source-threshold 256;
                    destination-threshold 4096;
                    timeout 20;
                }
                land;
                winnuke;
            }
            ip {
                source-route-option;
                tear-drop;
                spoofing;
            }
        }
    }
    nat {
        source {
            rule-set INTERNAL-TO-UNTRUST {
                from zone TRUST;
                to zone UNTRUST;
                rule PAT-OUT {
                    match {
                        source-address 0.0.0.0/0;
                    }
                    then {
                        source-nat {
                            interface;
                        }
                    }
                }
            }
        }
    }
    policies {
        from-zone TRUST to-zone UNTRUST {
            policy ALLOW-INTERNET {
                match {
                    source-address INTERNAL-NETS;
                    destination-address any;
                    application [ junos-http junos-https junos-dns-udp junos-dns-tcp junos-icmp-all junos-ntp ];
                }
                then {
                    permit;
                    log {
                        session-init;
                    }
                }
            }
            policy DENY-ALL {
                match {
                    source-address any;
                    destination-address any;
                    application any;
                }
                then {
                    deny;
                    log {
                        session-init;
                    }
                    count;
                }
            }
        }
        from-zone UNTRUST to-zone DMZ {
            policy ALLOW-WEB-TO-DMZ {
                match {
                    source-address any;
                    destination-address DMZ-NET;
                    application [ junos-http junos-https ];
                }
                then {
                    permit;
                    log {
                        session-init;
                        session-close;
                    }
                }
            }
        }
        from-zone TRUST to-zone DMZ {
            policy ALLOW-MGMT-TO-DMZ {
                match {
                    source-address MGMT-NET;
                    destination-address DMZ-NET;
                    application [ junos-ssh junos-https junos-icmp-all ];
                }
                then {
                    permit;
                }
            }
        }
        from-zone GUEST to-zone UNTRUST {
            policy GUEST-INTERNET-ONLY {
                match {
                    source-address GUEST-NET;
                    destination-address any;
                    application [ junos-http junos-https junos-dns-udp ];
                }
                then {
                    permit;
                    log {
                        session-init;
                    }
                }
            }
        }
    }
}
firewall {
    filter PROTECT-RE {
        term ALLOW-OSPF {
            from {
                protocol ospf;
            }
            then accept;
        }
        term ALLOW-SSH-MGMT {
            from {
                source-address {
                    10.100.99.0/24;
                }
                protocol tcp;
                destination-port ssh;
            }
            then accept;
        }
        term ALLOW-SNMP {
            from {
                source-address {
                    10.100.99.0/24;
                }
                protocol udp;
                destination-port snmp;
            }
            then accept;
        }
        term ALLOW-NTP {
            from {
                protocol udp;
                destination-port ntp;
            }
            then accept;
        }
        term ALLOW-ICMP {
            from {
                protocol icmp;
                icmp-type [ echo-request echo-reply unreachable time-exceeded ];
            }
            then {
                policer ICMP-RATE-LIMIT;
                accept;
            }
        }
        term DENY-ALL {
            then {
                discard;
                count DENIED-TO-RE;
                syslog;
            }
        }
    }
    policer ICMP-RATE-LIMIT {
        if-exceeding {
            bandwidth-limit 2m;
            burst-size-limit 32k;
        }
        then discard;
    }
}
snmp {
    location "ACME-DC1-MDF-Rack02";
    contact "secops@acme-corp.internal";
    community "$9$snmpCommunityForSRX01" {
        authorization read-only;
        clients {
            10.100.99.0/24;
        }
    }
    trap-group SECURITY-TRAPS {
        version v2;
        categories {
            authentication;
            chassis;
            link;
        }
        targets {
            10.100.99.50;
        }
    }
}
