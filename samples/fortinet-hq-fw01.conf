#conf_file_ver=00000001
#buildno=1639
config-version=FGT60F-7.4.3-FW-build2573-231117:opmode=0:vdom=0:user=admin

config system global
    set hostname FORTINET-HQ-FW01
    set timezone 00
    set admin-timeout 15
    set gui-theme neutrino
    set strong-crypto enable
    set login-timestamp enable
end

config system interface
    edit "wan1"
        set vdom "root"
        set ip 203.0.113.20 255.255.255.252
        set allowaccess ping
        set type physical
        set alias "WAN-ISP-UPLINK"
        set status up
    next
    edit "wan2"
        set vdom "root"
        set type physical
        set alias "WAN-BACKUP-UNUSED"
        set status down
    next
    edit "internal1"
        set vdom "root"
        set ip 10.30.0.1 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set alias "HQ-TRUST-LAN"
        set status up
    next
    edit "internal2"
        set vdom "root"
        set ip 10.20.0.1 255.255.255.0
        set allowaccess ping
        set type physical
        set alias "DMZ-WEB-SERVERS"
        set status up
    next
    edit "internal3"
        set vdom "root"
        set ip 10.50.0.1 255.255.255.0
        set allowaccess ping
        set type physical
        set alias "INTERNAL-SERVERS"
        set status up
    next
    edit "mgmt"
        set vdom "root"
        set ip 10.99.0.100 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set alias "OOB-MGMT"
        set status up
    next
    edit "ssl.root"
        set vdom "root"
        set type tunnel
        set alias "SSL-VPN-TUNNEL"
        set status up
    next
end

config system dns
    set primary 10.0.0.10
    set secondary 8.8.8.8
end

config system ntp
    set type custom
    set server-mode enable
    config ntpserver
        edit 1
            set server 10.0.0.10
            set ntpv3 enable
        next
        edit 2
            set server 10.0.0.11
        next
    end
end

config router static
    edit 1
        set dst 0.0.0.0/0
        set gateway 203.0.113.21
        set device "wan1"
        set comment "Default-Route"
    next
    edit 2
        set dst 172.16.0.0/12
        set gateway 10.30.0.254
        set device "internal1"
        set comment "VPN-Subnets"
    next
end

config router ospf
    set router-id 10.255.0.100
    config area
        edit 0.0.0.0
        next
    end
    config ospf-interface
        edit "internal1-ospf"
            set interface "internal1"
            set area 0.0.0.0
            set authentication md5
            set md5-keys
                edit 1
                    set key-string "$1$ospfkey456"
                next
            end
        next
        edit "internal3-ospf"
            set interface "internal3"
            set area 0.0.0.0
        next
    end
    config network
        edit 1
            set prefix 10.30.0.0 255.255.255.0
            set area 0.0.0.0
        next
        edit 2
            set prefix 10.50.0.0 255.255.255.0
            set area 0.0.0.0
        next
    end
end

config firewall address
    edit "HQ-TRUST-LAN"
        set type iprange
        set subnet 10.30.0.0 255.255.255.0
        set comment "HQ Trust Network"
    next
    edit "DMZ-SERVERS"
        set type iprange
        set subnet 10.20.0.0 255.255.255.0
    next
    edit "INTERNAL-SERVERS"
        set subnet 10.50.0.0 255.255.255.0
    next
    edit "MGMT-RANGE"
        set subnet 10.99.0.0 255.255.255.0
    next
end

config firewall addrgrp
    edit "INTERNAL-ALL"
        set member "HQ-TRUST-LAN" "DMZ-SERVERS" "INTERNAL-SERVERS" "MGMT-RANGE"
    next
end

config firewall service custom
    edit "SIP-VOICE"
        set protocol UDP
        set udp-portrange 5060-5061
    next
    edit "RTP-MEDIA"
        set protocol UDP
        set udp-portrange 16384-32767
    next
end

config firewall policy
    edit 1
        set name "TRUST-TO-INTERNET"
        set srcintf "internal1"
        set dstintf "wan1"
        set srcaddr "HQ-TRUST-LAN"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set logtraffic all
        set utm-status enable
        set av-profile "default"
        set webfilter-profile "default"
        set ips-sensor "default"
        set comments "HQ users internet access"
    next
    edit 2
        set name "TRUST-TO-SERVERS"
        set srcintf "internal1"
        set dstintf "internal3"
        set srcaddr "HQ-TRUST-LAN"
        set dstaddr "INTERNAL-SERVERS"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 3
        set name "TRUST-TO-DMZ-HTTP"
        set srcintf "internal1"
        set dstintf "internal2"
        set srcaddr "HQ-TRUST-LAN"
        set dstaddr "DMZ-SERVERS"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS"
    next
    edit 4
        set name "INTERNET-TO-DMZ-WEBPUB"
        set srcintf "wan1"
        set dstintf "internal2"
        set srcaddr "all"
        set dstaddr "DMZ-SERVERS"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS"
        set logtraffic all
        set utm-status enable
        set ips-sensor "default"
    next
    edit 5
        set name "MGMT-ACCESS"
        set srcintf "mgmt"
        set dstintf "internal1" "internal2" "internal3"
        set srcaddr "MGMT-RANGE"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "SSH" "HTTPS" "PING"
    next
    edit 100
        set name "IMPLICIT-DENY"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Catch-all deny"
    next
end

config firewall nat
    edit 1
        set origip 203.0.113.20
        set origport 80
        set mappedip 10.20.0.10
        set mappedport 80
        set type ippool
    next
end

config vpn ipsec phase1-interface
    edit "VPN-TO-BRANCH-01"
        set interface "wan1"
        set ike-version 2
        set keylife 86400
        set peertype any
        set proposal aes256-sha256
        set dhgrp 14
        set authmethod psk
        set psksecret "$1$vpnpsk/branchofficekey123"
        set remote-gw 203.0.113.50
        set add-route disable
    next
end

config vpn ipsec phase2-interface
    edit "VPN-PHASE2-BRANCH-01"
        set phase1name "VPN-TO-BRANCH-01"
        set proposal aes256-sha256
        set dhgrp 14
        set auto-negotiate enable
        set keylifeseconds 3600
        set src-subnet 10.30.0.0 255.255.255.0
        set dst-subnet 192.168.80.0 255.255.255.0
    next
end

config system admin
    edit "admin"
        set password "$1$adminhashedpassword"
        set accprofile "super_admin"
    next
    edit "netops"
        set password "$1$netopshashedpassword"
        set accprofile "prof_admin"
    next
end

config log syslogd setting
    set status enable
    set server 10.0.0.50
    set mode udp
    set port 514
    set facility local0
    set source-ip 10.99.0.100
end

config system snmp sysinfo
    set status enable
    set description "HQ Firewall"
    set contact-info "netops@lab.internal"
    set location "DC1-Row1-Rack1"
end

config system snmp community
    edit 1
        set name "$1$snmpcommhq"
        config hosts
            edit 1
                set ip 10.0.0.50/32
            next
        end
    next
end
