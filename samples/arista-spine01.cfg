! device: ARISTA-SPINE01 (DCS-7050SX3-48YC12, EOS-4.30.1F)
! boot system flash:/EOS-4.30.1F.swi
!
hostname ARISTA-SPINE01
!
username admin privilege 15 role network-admin secret sha512 $6$rounds=500000$saltsalt$hashedPasswordStringForArista123456789abcdefghijklmnopqrstuvwxyz01234567890ABC
username netops privilege 15 role network-admin secret sha512 $6$rounds=500000$saltsalt$anotherHashedPasswordStringForAristaXYZ987654321abcdefghijklmnopqrstuvwxyz
!
aaa authorization exec default local
!
ip domain-name acme-corp.internal
ip name-server vrf default 10.100.99.10
ip name-server vrf default 10.100.99.11
!
dns domain acme-corp.internal
!
ntp server 10.100.99.10 prefer
ntp server 10.100.99.11
!
snmp-server community rO-spine01! ro
snmp-server location ACME-DC1-Spine-Row1-Rack01
snmp-server contact noc@acme-corp.internal
snmp-server host 10.100.99.50 version 2c rO-spine01!
!
spanning-tree mode mstp
spanning-tree mst 0 priority 4096
!
vlan 10
   name SERVERS
!
vlan 20
   name WORKSTATIONS
!
vlan 30
   name VOIP
!
vlan 40
   name WIRELESS
!
vlan 99
   name MANAGEMENT
!
vlan 100
   name NATIVE
!
interface Ethernet1
   description TRANSIT-TO-SRX-FW01 | to SRX-FW01 ge-0/0/2
   no switchport
   ip address 172.16.0.6 255.255.255.252
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Ethernet2
   description TRANSIT-TO-FG-DC-FW01 | to FG-DC-FW01 port2
   no switchport
   ip address 172.16.0.9 255.255.255.252
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Ethernet3
   description DOWNLINK-TO-EXOS-TOR-SW01 | to EXOS-TOR-SW01 port1
   switchport trunk native vlan 100
   switchport trunk allowed vlan 10,20,99
   switchport mode trunk
!
interface Ethernet4
   description DOWNLINK-TO-HW-DIST-SW01 | to HW-DIST-SW01 GE0/0/1
   switchport trunk native vlan 100
   switchport trunk allowed vlan 10,20,30,40,99
   switchport mode trunk
!
interface Ethernet5
   description SERVER-RACK-A-ESXi01
   switchport access vlan 10
   switchport mode access
   spanning-tree portfast
!
interface Ethernet6
   description SERVER-RACK-A-ESXi02
   switchport access vlan 10
   switchport mode access
   spanning-tree portfast
!
interface Ethernet7
   description SERVER-RACK-A-ESXi03
   switchport access vlan 10
   switchport mode access
   spanning-tree portfast
!
interface Ethernet8
   description SERVER-RACK-B-STORAGE01
   switchport access vlan 10
   switchport mode access
   spanning-tree portfast
!
interface Ethernet9
   description SERVER-RACK-B-STORAGE02
   switchport access vlan 10
   switchport mode access
   spanning-tree portfast
!
interface Ethernet10
   shutdown
!
interface Ethernet11
   shutdown
!
interface Ethernet12
   shutdown
!
interface Loopback0
   description ROUTER-ID
   ip address 10.255.1.3/32
!
interface Vlan10
   description SERVERS-SVI
   ip address 10.100.10.1 255.255.255.0
   ip helper-address 10.100.99.10
   ip ospf area 0.0.0.0
   no shutdown
!
interface Vlan20
   description WORKSTATIONS-SVI
   ip address 10.100.50.1 255.255.255.0
   ip helper-address 10.100.99.10
   ip ospf area 0.0.0.0
   no shutdown
!
interface Vlan30
   description VOIP-SVI
   ip address 10.100.60.1 255.255.255.0
   ip helper-address 10.100.99.10
   ip ospf area 0.0.0.0
   no shutdown
!
interface Vlan40
   description WIRELESS-SVI
   ip address 10.100.70.1 255.255.255.0
   ip helper-address 10.100.99.10
   ip ospf area 0.0.0.0
   no shutdown
!
interface Vlan99
   description MANAGEMENT-SVI
   ip address 10.100.99.3 255.255.255.0
   no shutdown
!
interface Management1
   description OOB-MGMT
   ip address 192.168.200.3 255.255.255.0
!
ip routing
!
router ospf 1
   router-id 10.255.1.3
   passive-interface default
   no passive-interface Ethernet1
   no passive-interface Ethernet2
   network 10.255.1.3/32 area 0.0.0.0
   network 172.16.0.4/30 area 0.0.0.0
   network 172.16.0.8/30 area 0.0.0.0
   max-lsa 12000
!
ip access-list MGMT-VTY
   10 permit tcp 10.100.99.0/24 any eq ssh
   20 permit tcp 192.168.200.0/24 any eq ssh
   99 deny ip any any log
!
logging host 10.100.99.50
logging host 10.100.99.51
logging buffered 65536 informational
logging source-interface Loopback0
!
banner motd
===========================================================
  ACME Corp - ARISTA-SPINE01 - DC Spine Layer
  Unauthorized access is prohibited.
===========================================================
EOF
!
management api http-commands
   protocol https
   no shutdown
!
management ssh
   idle-timeout 30
   login timeout 60
!
end
