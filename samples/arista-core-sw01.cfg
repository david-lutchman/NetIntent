! Arista EOS
! Software image version: 4.29.2F
! boot system flash:EOS-4.29.2F.swi
!
hostname ARISTA-CORE-SW01
!
username admin privilege 15 secret sha512 $6$aristaadmin$hashedpassword123456789
username netops privilege 5 secret sha512 $6$netops$hashednetopspassword
!
aaa authentication login default group radius local
aaa authorization exec default local
!
radius-server host 10.0.0.20 key 7 $1$radiuskey123
!
management api http-commands
   no shutdown
   protocol https
      ssl profile EOS5
!
management ssh
   idle-timeout 15
   login-attempts 3
!
daemon TerminAttr
   exec /usr/bin/TerminAttr -cvaddr=apiserver.arista.io:443 -cvauth=token,/tmp/token -cvvrf=MGMT -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -ingestexclude=/Sysdb/cell/1/agent,/Sysdb/cell/2/agent -taillogs
   no shutdown
!
ip routing
ipv6 unicast-routing
!
spanning-tree mode mstp
spanning-tree mst 0 priority 4096
!
vlan 10
   name User-LAN
!
vlan 20
   name Voice
!
vlan 30
   name Servers
!
vlan 40
   name DMZ
!
vlan 99
   name Management
!
interface Ethernet1
   description UPLINK-TO-ARISTA-DIST-SW02-Eth1
   no switchport
   ip address 10.1.0.1/30
   bfd interval 300 min-rx 300 multiplier 3
!
interface Ethernet2
   description UPLINK-TO-JUNIPER-CORE-GW01-ge-0/0/2
   no switchport
   ip address 10.1.0.5/30
!
interface Ethernet3
   description DOWNLINK-TO-ARISTA-DIST-SW02-Eth3
   switchport mode trunk
   switchport trunk allowed vlan 10,20,30,40,99
   switchport trunk native vlan 99
   spanning-tree portfast network
!
interface Ethernet4
   description DOWNLINK-TO-EXTREME-ACCESS-SW01-port1
   switchport mode trunk
   switchport trunk allowed vlan 10,20,30,99
!
interface Ethernet5
   description DOWNLINK-TO-EXTREME-ACCESS-SW02-port1
   switchport mode trunk
   switchport trunk allowed vlan 10,20,30,99
!
interface Ethernet6
   description SERVER-HYPERVISOR-01
   switchport mode trunk
   switchport trunk allowed vlan 30,40
!
interface Ethernet7
   description SERVER-HYPERVISOR-02
   switchport mode trunk
   switchport trunk allowed vlan 30,40
!
interface Ethernet8
   description LAG-MEMBER-TO-DIST-SW02
   channel-group 1 mode active
!
interface Ethernet9
   description LAG-MEMBER-TO-DIST-SW02
   channel-group 1 mode active
!
interface Ethernet10
   description SPARE-DISABLED
   shutdown
!
interface Port-Channel1
   description LAG-TO-ARISTA-DIST-SW02
   switchport mode trunk
   switchport trunk allowed vlan 10,20,30,40,99
!
interface Loopback0
   description ROUTER-ID
   ip address 10.255.0.10/32
!
interface Management1
   description OOB-MGMT
   ip address 10.99.0.10/24
!
interface Vlan10
   description User-LAN-Gateway
   ip address 10.10.10.1/24
   ip helper-address 10.10.30.5
!
interface Vlan20
   description Voice-Gateway
   ip address 10.10.20.1/24
!
interface Vlan30
   description Servers-Gateway
   ip address 10.10.30.1/24
!
interface Vlan40
   description DMZ-Gateway
   ip address 10.20.40.1/24
!
interface Vlan99
   description Management-Gateway
   ip address 10.99.0.1/24
!
router ospf 1
   router-id 10.255.0.10
   passive-interface default
   no passive-interface Ethernet1
   no passive-interface Ethernet2
   network 10.0.0.0/8 area 0.0.0.0
!
router bgp 65001
   router-id 10.255.0.10
   neighbor 10.1.0.2 remote-as 65002
   neighbor 10.1.0.6 remote-as 65000
!
ip route 0.0.0.0/0 10.1.0.6
!
ip access-list standard MGMT-ACL
   10 permit 10.99.0.0/24
   20 deny any
!
ntp server 10.0.0.10 prefer
ntp server 10.0.0.11
!
snmp-server community $1$snmpcommarista authorization ro
snmp-server host 10.0.0.50 traps version 2c $1$snmptrap
snmp-server location DC1-Row1-Rack1
snmp-server contact netops@lab.internal
!
logging host 10.0.0.50
logging trap notifications
!
end
