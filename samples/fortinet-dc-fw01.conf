#config-version=FG200F-7.4.3-FW-build2573-240514:opmode=0:vdom=0:user=admin
#conf_file_ver=19283746501
#buildno=2573
#global_vdom=1
config system global
    set admintimeout 30
    set hostname "FG-DC-FW01"
    set timezone 12
    set gui-theme mariner
end
config system accprofile
    edit "secops_profile"
        set secfabgrp read-write
        set ftviewgrp read-write
        set authgrp read-write
        set sysgrp read-write
        set netgrp read-write
        set loggrp read-write
        set fwgrp read-write
        set vpngrp read-write
        set utmgrp read-write
    next
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        set vdom "root"
        config gui-dashboard
        end
        set password ENC SH2+3XlFqwRPKJdm5NnB7TvGhYcEr
    next
    edit "secops"
        set accprofile "secops_profile"
        set vdom "root"
        set password ENC SH2+8YmGrxSQLKen6OoC8UwHiZdFs
    next
end
config system dns
    set primary 10.100.99.10
    set secondary 10.100.99.11
    set domain "acme-corp.internal"
end
config system ntp
    set ntpsync enable
    set server-mode enable
    config ntpserver
        edit 1
            set server 10.100.99.10
        next
        edit 2
            set server 10.100.99.11
        next
    end
end
config system interface
    edit "port1"
        set vdom "root"
        set ip 172.16.0.42 255.255.255.252
        set allowaccess ping
        set type physical
        set alias "TRANSIT-TO-SRX-FW01 | to SRX-FW01 ge-0/0/1"
        set lldp-transmission enable
        set role wan
    next
    edit "port2"
        set vdom "root"
        set ip 172.16.0.10 255.255.255.252
        set allowaccess ping
        set type physical
        set alias "TRANSIT-TO-ARISTA-SPINE01 | to ARISTA-SPINE01 Et2"
        set lldp-transmission enable
        set role wan
    next
    edit "port3"
        set vdom "root"
        set ip 172.16.0.37 255.255.255.252
        set allowaccess ping
        set type physical
        set alias "LINK-TO-EXOS-TOR-SW01 | to EXOS-TOR-SW01 port2"
        set lldp-transmission enable
        set role lan
    next
    edit "port4"
        set vdom "root"
        set ip 10.200.10.1 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set alias "DC-SERVER-SEGMENT-A"
        set role lan
    next
    edit "port5"
        set vdom "root"
        set ip 10.200.20.1 255.255.255.0
        set allowaccess ping
        set type physical
        set alias "DC-SERVER-SEGMENT-B"
        set role lan
    next
    edit "port6"
        set vdom "root"
        set type physical
        set alias "UNUSED"
        set status down
    next
    edit "port7"
        set vdom "root"
        set type physical
        set alias "UNUSED"
        set status down
    next
    edit "port8"
        set vdom "root"
        set ip 10.200.99.1 255.255.255.0
        set allowaccess ping https ssh snmp
        set type physical
        set alias "DC-MGMT-SEGMENT"
        set role dmz
    next
    edit "loopback0"
        set vdom "root"
        set ip 10.255.1.4 255.255.255.255
        set type loopback
        set alias "ROUTER-ID"
    next
    edit "ha-heartbeat"
        set vdom "root"
        set type physical
        set alias "HA-HEARTBEAT"
    next
end
config router ospf
    set router-id 10.255.1.4
    config area
        edit 0.0.0.0
        next
    end
    config ospf-interface
        edit "port1-ospf"
            set interface "port1"
            set network-type point-to-point
            set hello-interval 5
            set dead-interval 20
        next
        edit "port2-ospf"
            set interface "port2"
            set network-type point-to-point
            set hello-interval 5
            set dead-interval 20
        next
    end
    config network
        edit 1
            set prefix 172.16.0.40 255.255.255.252
            set area 0.0.0.0
        next
        edit 2
            set prefix 172.16.0.8 255.255.255.252
            set area 0.0.0.0
        next
        edit 3
            set prefix 10.255.1.4 255.255.255.255
            set area 0.0.0.0
        next
    end
    config passive-interface
        edit "port3"
        next
        edit "port4"
        next
        edit "port5"
        next
        edit "port8"
        next
    end
end
config router static
    edit 1
        set dst 10.200.0.0 255.255.0.0
        set gateway 172.16.0.9
        set device "port2"
        set comment "DC-SEGMENTS-VIA-SPINE"
    next
end
config firewall address
    edit "SERVERS-NET-A"
        set subnet 10.200.10.0 255.255.255.0
    next
    edit "SERVERS-NET-B"
        set subnet 10.200.20.0 255.255.255.0
    next
    edit "INTERNAL-NETS"
        set subnet 10.100.0.0 255.255.0.0
    next
    edit "DC-MGMT"
        set subnet 10.200.99.0 255.255.255.0
    next
    edit "TRANSIT-SRX"
        set subnet 172.16.0.40 255.255.255.252
    next
    edit "TRANSIT-SPINE"
        set subnet 172.16.0.8 255.255.255.252
    next
end
config firewall addrgrp
    edit "DC-SERVER-SEGMENTS"
        set member "SERVERS-NET-A" "SERVERS-NET-B"
    next
end
config firewall service custom
    edit "HTTPS-ALT"
        set protocol TCP
        set tcp-portrange 8443
    next
    edit "VEEAM-BACKUP"
        set protocol TCP
        set tcp-portrange 9392-9395
    next
end
config firewall policy
    edit 1
        set name "INTERNAL-TO-DC-SERVERS"
        set srcintf "port1" "port2"
        set dstintf "port4" "port5"
        set action accept
        set srcaddr "INTERNAL-NETS"
        set dstaddr "DC-SERVER-SEGMENTS"
        set schedule "always"
        set service "HTTPS" "HTTP" "SSH" "PING" "HTTPS-ALT"
        set logtraffic all
        set utm-status enable
        set av-profile "default"
        set ips-sensor "default"
    next
    edit 2
        set name "DC-SERVERS-TO-INTERNET"
        set srcintf "port4" "port5"
        set dstintf "port1"
        set action accept
        set srcaddr "DC-SERVER-SEGMENTS"
        set dstaddr "all"
        set schedule "always"
        set service "HTTPS" "HTTP" "DNS" "NTP"
        set logtraffic all
        set nat enable
    next
    edit 3
        set name "MGMT-TO-DC"
        set srcintf "port8"
        set dstintf "port4" "port5"
        set action accept
        set srcaddr "DC-MGMT"
        set dstaddr "DC-SERVER-SEGMENTS"
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 4
        set name "DC-INTER-SEGMENT"
        set srcintf "port4"
        set dstintf "port5"
        set action accept
        set srcaddr "SERVERS-NET-A"
        set dstaddr "SERVERS-NET-B"
        set schedule "always"
        set service "ALL"
        set logtraffic utm
    next
    edit 99
        set name "DENY-ALL"
        set srcintf "any"
        set dstintf "any"
        set action deny
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
end
config system ha
    set group-id 10
    set group-name "DC-FW-CLUSTER"
    set mode a-p
    set hbdev "ha-heartbeat" 0
    set session-pickup enable
    set override disable
    set priority 200
    set monitor "port1" "port2" "port3"
end
config log syslogd setting
    set status enable
    set server "10.100.99.50"
    set port 514
    set facility local7
end
config log syslogd2 setting
    set status enable
    set server "10.100.99.51"
    set port 514
    set facility local7
end
config system snmp sysinfo
    set status enable
    set description "FG-DC-FW01 - ACME DC Internal Firewall"
    set contact-info "noc@acme-corp.internal"
    set location "ACME-DC1-MDF-Rack03"
end
config system snmp community
    edit 1
        set name "rO-fg-dc01!"
        config hosts
            edit 1
                set ip 10.100.99.50 255.255.255.255
            next
            edit 2
                set ip 10.100.99.0 255.255.255.0
            next
        end
        set events cpu-high mem-low fm-if-change
    next
end
