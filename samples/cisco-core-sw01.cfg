!
! Last configuration change at 14:32:01 UTC Wed Jan 15 2026
!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
!
hostname CORE-SW01
!
boot-start-marker
boot-end-marker
!
enable secret 5 $1$mERr$hx5rVt7rPNoS4wqbXKX7m0
!
username admin privilege 15 secret 5 $1$mERr$9AJFmwoV2iJbERjkCmDxE1
username readonly privilege 1 secret 5 $1$SjkL$pE5GhJ4bRfnMbUvYjKW3c1
!
aaa new-model
aaa authentication login default local
aaa authorization exec default local
!
ip domain-name lab.internal
ip name-server 10.0.0.10
ip name-server 10.0.0.11
!
ip ssh version 2
crypto key generate rsa modulus 2048
!
vlan 10
 name SERVERS
vlan 20
 name WORKSTATIONS
vlan 30
 name VOIP
vlan 99
 name MANAGEMENT
vlan 100
 name NATIVE_VLAN
!
spanning-tree mode rapid-pvst
spanning-tree extend system-id
spanning-tree vlan 10,20,30,99 priority 4096
!
interface GigabitEthernet0/1
 description UPLINK-TO-DIST-SW01
 switchport trunk encapsulation dot1q
 switchport trunk native vlan 100
 switchport trunk allowed vlan 10,20,30,99
 switchport mode trunk
 spanning-tree portfast disable
 no shutdown
!
interface GigabitEthernet0/2
 description UPLINK-TO-DIST-SW02
 switchport trunk encapsulation dot1q
 switchport trunk native vlan 100
 switchport trunk allowed vlan 10,20,30,99
 switchport mode trunk
 spanning-tree portfast disable
 no shutdown
!
interface GigabitEthernet0/3
 description SERVER-RACK-A
 switchport access vlan 10
 switchport mode access
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet0/4
 description SERVER-RACK-B
 switchport access vlan 10
 switchport mode access
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet0/5
 description WORKSTATION-FLOOR2
 switchport access vlan 20
 switchport mode access
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet0/6
 description VOIP-PHONE-FLOOR2
 switchport access vlan 30
 switchport voice vlan 30
 switchport mode access
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet0/7
 shutdown
!
interface GigabitEthernet0/8
 shutdown
!
interface Vlan10
 description SERVERS_SVI
 ip address 10.10.10.1 255.255.255.0
 no shutdown
!
interface Vlan20
 description WORKSTATIONS_SVI
 ip address 10.20.20.1 255.255.255.0
 no shutdown
!
interface Vlan30
 description VOIP_SVI
 ip address 10.30.30.1 255.255.255.0
 no shutdown
!
interface Vlan99
 description MANAGEMENT_SVI
 ip address 10.99.99.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.99.99.1
 network 10.10.10.0 0.0.0.255 area 0
 network 10.20.20.0 0.0.0.255 area 0
 network 10.30.30.0 0.0.0.255 area 0
 network 10.99.99.0 0.0.0.255 area 0
 passive-interface default
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
!
ip access-list extended MGMT-ACCESS
 permit tcp 10.99.99.0 0.0.0.255 any eq 22
 permit tcp 10.99.99.0 0.0.0.255 any eq 443
 deny ip any any log
!
snmp-server community Pr1vate!RO RO
snmp-server community Pr1vate!RW RW
snmp-server location DataCenter-Floor2
snmp-server contact noc@lab.internal
!
ntp server 10.0.0.10
ntp server 10.0.0.11
!
line con 0
 logging synchronous
 login authentication default
!
line vty 0 15
 access-class MGMT-ACCESS in
 transport input ssh
 login authentication default
!
end
