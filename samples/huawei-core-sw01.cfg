sysname HUAWEI-CORE-SW01
#
info-center source default channel 2 log level warning
info-center loghost 10.0.0.50 facility local0
#
vlan batch 10 20 30 40 99
#
vlan 10
 description User-LAN
#
vlan 20
 description Voice
#
vlan 30
 description Servers
#
vlan 40
 description DMZ
#
vlan 99
 description Management
#
authentication-profile name RADIUS-PROFILE
 radius-server template RADIUS-TEMPLATE
#
radius-server template RADIUS-TEMPLATE
 radius-server authentication 10.0.0.20 1812
 radius-server accounting 10.0.0.20 1813
 radius-server shared-key cipher "$1$radiuskey789huawei"
#
interface GigabitEthernet0/0/0
 description UPLINK-TO-HUAWEI-DIST-SW01-GE0/0/1
 undo shutdown
 ip address 10.1.0.17 255.255.255.252
 ospf enable 1 area 0
#
interface GigabitEthernet0/0/1
 description UPLINK-TO-ARISTA-CORE-SW01-Eth5
 undo shutdown
 ip address 10.1.0.21 255.255.255.252
 ospf enable 1 area 0
#
interface GigabitEthernet0/0/2
 description DOWNLINK-TO-HUAWEI-ACCESS-SW01-GE0/0/1
 undo shutdown
 port link-type trunk
 port trunk allow-pass vlan 10 20 30 99
 port trunk pvid vlan 99
#
interface GigabitEthernet0/0/3
 description DOWNLINK-TO-HUAWEI-ACCESS-SW02-GE0/0/1
 undo shutdown
 port link-type trunk
 port trunk allow-pass vlan 10 20 99
#
interface GigabitEthernet0/0/4
 description DOWNLINK-TO-HPE-ARUBA-ACCESS-SW02-1
 undo shutdown
 port link-type trunk
 port trunk allow-pass vlan 10 20 30 99
#
interface GigabitEthernet0/0/5
 description SERVER-HYPERVISOR-CLUSTER-A
 undo shutdown
 port link-type trunk
 port trunk allow-pass vlan 30 40
#
interface GigabitEthernet0/0/6
 description SERVER-HYPERVISOR-CLUSTER-B
 undo shutdown
 port link-type trunk
 port trunk allow-pass vlan 30 40
#
interface GigabitEthernet0/0/7
 description SPARE-DISABLED
 shutdown
#
interface GigabitEthernet0/0/8
 description SPARE-DISABLED
 shutdown
#
interface Eth-Trunk1
 description LAG-TO-HUAWEI-DIST-SW01
 mode lacp-static
 port link-type trunk
 port trunk allow-pass vlan 10 20 30 40 99
#
interface LoopBack0
 description ROUTER-ID-LOOPBACK
 ip address 10.255.0.20 255.255.255.255
#
interface Vlanif10
 description User-LAN-Gateway
 ip address 10.10.10.4 255.255.255.0
 dhcp select relay
 dhcp relay server-ip 10.10.30.5
#
interface Vlanif20
 description Voice-LAN-Gateway
 ip address 10.10.20.4 255.255.255.0
#
interface Vlanif30
 description Servers-Gateway
 ip address 10.10.30.4 255.255.255.0
#
interface Vlanif40
 description DMZ-Gateway
 ip address 10.20.40.4 255.255.255.0
#
interface Vlanif99
 description Management-Gateway
 ip address 10.99.0.4 255.255.255.0
