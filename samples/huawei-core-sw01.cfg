ospf 1 router-id 10.255.0.20
 area 0.0.0.0
  authentication-mode md5 1 cipher "$1$ospfkeyhuawei"
  network 10.10.10.0 0.0.0.255
  network 10.10.20.0 0.0.0.255
  network 10.10.30.0 0.0.0.255
  network 10.1.0.16 0.0.0.3
  network 10.1.0.20 0.0.0.3
#
ip route-static 0.0.0.0 0.0.0.0 10.1.0.18
#
stp mode mstp
stp priority 4096
stp enable
#
acl 2000
 description MGMT-ACCESS-ACL
 rule 10 permit source 10.99.0.0 0.0.0.255
 rule 20 deny source any
#
user-interface vty 0 4
 authentication-mode aaa
 protocol inbound ssh
 acl 2000 inbound
#
user-interface console 0
 authentication-mode password
#
snmp-agent
snmp-agent community read cipher "$1$snmpcommhuawei"
snmp-agent trap enable
snmp-agent target-host trap address udp-domain 10.0.0.50 params securityname "$1$snmptraphw"
snmp-agent sys-info contact netops@lab.internal
snmp-agent sys-info location DC1-Row3-Rack7
snmp-agent sys-info version v2c
#
ntp-service unicast-server 10.0.0.10 prefer
ntp-service unicast-server 10.0.0.11
#
lldp enable
#
return
